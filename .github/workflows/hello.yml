name: Artifact Demo

on:
  push:
    branches:
      - main

jobs:
  create-file:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: echo "Hello World from Job 1" > file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt

  read-file:
    runs-on: ubuntu-latest
    needs: create-file

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: Read file
        run: cat file.txt